<button
  [ngClass]="{
    'nav__button--active': isActive,
  }"
  class="nav__button"
  (click)="onClick($event)"
>
  @if(isActive && iconUrlActive !== null) {
    <img [ngSrc]="iconUrlActive" height="24" width="24" alt="active icon">
  } @else {
    <img [ngSrc]="iconUrl" height="24" width="24" alt="non-active icon">
  }
  <span>
    {{ text }}
  </span>
</button>
